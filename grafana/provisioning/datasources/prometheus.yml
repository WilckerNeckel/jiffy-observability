apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: $GRAFANA_PROMETHEUS_DATASOURCE_URL # default: http://prometheus:9090
    basicAuth: $GRAFANA_BASIC_AUTH_ENABLED # default: false
    basicAuthUser: $GRAFANA_BASIC_AUTH_USERNAME
    secureJsonData:
      basicAuthPassword: $GRAFANA_BASIC_AUTH_PASSWORD
    isDefault: false
    editable: false
