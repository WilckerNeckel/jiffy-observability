apiVersion: 1

groups:
  - orgId: 1
    name: application
    folder: Infrastructure
    interval: 1m

    rules:
      - uid: backend_latency_p95_warning
        title: Backend latência p95 acima de 2s
        condition: A

        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0

            datasourceUid: prometheus

            model:
              datasource:
                type: prometheus
                uid: prometheus

              editorMode: code

              expr: |
                histogram_quantile(
                  0.95,
                  sum by (le) (
                    rate(http_server_duration_milliseconds_bucket{
                      job="backend/jiffy-backend"
                    }[5m])
                  )
                ) > bool 2000

              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A

        noDataState: OK
        execErrState: Alerting

        for: 5m

        annotations:
          summary: Backend com latência p95 acima de 2s
          description: |
            O backend jiffy-backend está com latência p95 acima de 2 segundos
            há mais de 5 minutos.

        labels:
          severity: warning
          service: jiffy-backend
          component: http

      - uid: backend_latency_p95_critical
        title: Backend latência p95 acima de 5s
        condition: A

        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0

            datasourceUid: prometheus

            model:
              datasource:
                type: prometheus
                uid: prometheus

              editorMode: code

              expr: |
                histogram_quantile(
                  0.95,
                  sum by (le) (
                    rate(http_server_duration_milliseconds_bucket{
                      job="backend/jiffy-backend"
                    }[5m])
                  )
                ) > bool 5000

              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A

        noDataState: OK
        execErrState: Alerting

        for: 5m

        annotations:
          summary: Backend com latência p95 acima de 5s
          description: |
            O backend jiffy-backend está com latência p95 acima de 5 segundos
            há mais de 5 minutos.

        labels:
          severity: critical
          service: jiffy-backend
          component: http

      - uid: backend_latency_degradation
        title: Backend latência degradada
        condition: A

        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0

            datasourceUid: prometheus

            model:
              datasource:
                type: prometheus
                uid: prometheus

              editorMode: code

              expr: |
                (
                  histogram_quantile(
                    0.95,
                    sum by (le) (
                      rate(http_server_duration_milliseconds_bucket{
                        job="backend/jiffy-backend"
                      }[5m])
                    )
                  )
                  /
                  clamp_min(
                    histogram_quantile(
                      0.95,
                      sum by (le) (
                        rate(http_server_duration_milliseconds_bucket{
                          job="backend/jiffy-backend"
                        }[1h])
                      )
                    ),
                    1
                  )
                ) > bool 1.5
                and
                sum(
                  rate(http_server_duration_milliseconds_count{
                    job="backend/jiffy-backend"
                  }[5m])
                ) > 0.05

              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A

        noDataState: OK
        execErrState: Alerting

        for: 10m

        annotations:
          summary: Backend com latência degradada
          description: |
            O backend jiffy-backend está com latência p95 nos últimos 5 minutos
            acima de 1,5× a baseline da última hora, há mais de 10 minutos. Ou seja aumentou mais de 50% em relação à baseline da última hora.

        labels:
          severity: warning
          service: jiffy-backend
          component: http

      - uid: backend_error_rate_warning
        title: Backend taxa de erro 5xx acima de 5%
        condition: A

        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0

            datasourceUid: prometheus

            model:
              datasource:
                type: prometheus
                uid: prometheus

              editorMode: code

              expr: |
                (
                  (
                    sum(
                      rate(http_server_duration_milliseconds_count{
                        job="backend/jiffy-backend",
                        http_status_code=~"5.."
                      }[5m])
                    ) or vector(0)
                  )
                  /
                  clamp_min(
                    sum(
                      rate(http_server_duration_milliseconds_count{
                        job="backend/jiffy-backend"
                      }[5m])
                    ),
                    1e-6
                  )
                ) * 100 > bool 5
                and
                sum(
                  rate(http_server_duration_milliseconds_count{
                    job="backend/jiffy-backend"
                  }[5m])
                ) > 0.05

              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A

        noDataState: OK
        execErrState: Alerting

        for: 5m

        annotations:
          summary: Backend com taxa de erro 5xx acima de 5%
          description: |
            O backend jiffy-backend está respondendo com mais de 5% de erros HTTP 5xx
            nos últimos 5 minutos, há mais de 5 minutos.

        labels:
          severity: warning
          service: jiffy-backend
          component: http

      - uid: backend_error_rate_critical
        title: Backend taxa de erro 5xx acima de 15%
        condition: A

        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0

            datasourceUid: prometheus

            model:
              datasource:
                type: prometheus
                uid: prometheus

              editorMode: code

              expr: |
                (
                  (
                    sum(
                      rate(http_server_duration_milliseconds_count{
                        job="backend/jiffy-backend",
                        http_status_code=~"5.."
                      }[5m])
                    ) or vector(0)
                  )
                  /
                  clamp_min(
                    sum(
                      rate(http_server_duration_milliseconds_count{
                        job="backend/jiffy-backend"
                      }[5m])
                    ),
                    1e-6
                  )
                ) * 100 > bool 15
                and
                sum(
                  rate(http_server_duration_milliseconds_count{
                    job="backend/jiffy-backend"
                  }[5m])
                ) > 0.05

              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A

        noDataState: OK
        execErrState: Alerting

        for: 5m

        annotations:
          summary: Backend com taxa de erro 5xx acima de 15%
          description: |
            O backend jiffy-backend está respondendo com mais de 15% de erros HTTP 5xx
            nos últimos 5 minutos, há mais de 5 minutos.

        labels:
          severity: critical
          service: jiffy-backend
          component: http
