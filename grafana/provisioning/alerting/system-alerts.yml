apiVersion: 1

groups:
  - orgId: 1
    name: system-disk
    folder: Infrastructure
    interval: 1m

    rules:
      - uid: system_disk_usage_warning
        title: Uso de Disco Alto
        condition: A

        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: |
                100 * (
                  1 -
                  (
                    node_filesystem_avail_bytes{
                      job="node-exporter",
                      mountpoint="/",
                      fstype!~"tmpfs|overlay|squashfs"
                    }
                    /
                    node_filesystem_size_bytes{
                      job="node-exporter",
                      mountpoint="/",
                      fstype!~"tmpfs|overlay|squashfs"
                    }
                  )
                ) > 80
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A

        noDataState: NoData
        execErrState: Alerting
        for: 10m

        annotations:
          summary: "Uso de disco alto em {{ $labels.server }}"
          description: |
            O servidor {{ $labels.server }} está com mais de 80% de uso no disco raiz.

        labels:
          severity: warning
          service: system-disk

      - uid: system_disk_usage_critical
        title: Uso de Disco Crítico
        condition: A

        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: |
                100 * (
                  1 -
                  (
                    node_filesystem_avail_bytes{
                      job="node-exporter",
                      mountpoint="/",
                      fstype!~"tmpfs|overlay|squashfs"
                    }
                    /
                    node_filesystem_size_bytes{
                      job="node-exporter",
                      mountpoint="/",
                      fstype!~"tmpfs|overlay|squashfs"
                    }
                  )
                ) > 90
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A

        noDataState: NoData
        execErrState: Alerting
        for: 5m

        annotations:
          summary: "Uso de disco crítico em {{ $labels.server }}"
          description: |
            O servidor {{ $labels.server }} está com mais de 90% de uso no disco raiz.
            Verifique crescimento de logs, banco de dados, Docker volumes e backups locais.

        labels:
          severity: critical
          service: system-disk