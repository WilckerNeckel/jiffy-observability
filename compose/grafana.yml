services:
    grafana:
        image: grafana/grafana:12.3.1
        environment:
            GF_PATHS_PROVISIONING: /etc/grafana/provisioning
            GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
            GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
            GF_SMTP_ENABLED: ${GF_SMTP_ENABLED:-false}
            GF_SMTP_HOST: ${GF_SMTP_HOST:-}
            GF_SMTP_USER: ${GF_SMTP_USER:-}
            GF_SMTP_PASSWORD: ${GF_SMTP_PASSWORD:-}
            GF_SMTP_FROM_ADDRESS: ${GF_SMTP_FROM_ADDRESS:-admin@grafana.localhost}
            GF_SMTP_FROM_NAME: ${GF_SMTP_FROM_NAME:-Grafana}
            GF_SMTP_SKIP_VERIFY: ${GF_SMTP_SKIP_VERIFY:-false}
            GF_SMTP_EHLO_IDENTITY: ${GF_SMTP_EHLO_IDENTITY:-}
            GF_SMTP_STARTTLS_POLICY: ${GF_SMTP_STARTTLS_POLICY:-}
            GF_SMTP_CERT_FILE: ${GF_SMTP_CERT_FILE:-}
            GF_SMTP_KEY_FILE: ${GF_SMTP_KEY_FILE:-}
            GF_SMTP_ENABLE_TRACING: ${GF_SMTP_ENABLE_TRACING:-false}
            GRAFANA_LOKI_DATASOURCE_URL: ${GRAFANA_LOKI_DATASOURCE_URL:-http://loki:3100}
            GRAFANA_PROMETHEUS_DATASOURCE_URL: ${GRAFANA_PROMETHEUS_DATASOURCE_URL:-http://prometheus:9090}
            TEMPO_QUERY_API: ${TEMPO_QUERY_API:-http://tempo:3200}
            GRAFANA_BASIC_AUTH_ENABLED: ${GRAFANA_BASIC_AUTH_ENABLED:-false}
            GRAFANA_BASIC_AUTH_USERNAME: ${GRAFANA_BASIC_AUTH_USERNAME:-}
            GRAFANA_BASIC_AUTH_PASSWORD: ${GRAFANA_BASIC_AUTH_PASSWORD:-}
        # depends_on:
        #   loki:
        #     condition: service_healthy
        volumes:
            - ./grafana/provisioning:/etc/grafana/provisioning
            - ./.data/grafana-data:/var/lib/grafana
        networks:
            - observability
            - traefik-proxy
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1",
                ]
            interval: 10s
            timeout: 5s
            retries: 5

        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.grafana.rule=Host(`${TRAEFIK_DOMAIN}`)"
            - "traefik.http.routers.grafana.entrypoints=websecure"
            - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
            - "traefik.http.services.grafana.loadbalancer.server.port=3000"
            - "traefik.docker.network=traefik-proxy"
